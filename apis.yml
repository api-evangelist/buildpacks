aid: buildpacks
name: Cloud Native Buildpacks
description: >-
  Cloud Native Buildpacks (CNBs) transform application source code into
  OCI-compliant container images that can run on any cloud, without requiring
  Dockerfiles. Initiated by Pivotal and Heroku in January 2018, CNBs are a CNCF
  incubating project licensed under Apache-2.0. They centralize container
  expertise through composable buildpacks, enable layer rebasing for efficient
  OS updates, and generate Software Bills of Materials (SBOM). The pack CLI and
  kpack platform operator are primary integration points.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/buildpacks/refs/heads/main/apis.yml
created: '2025-01-01'
modified: '2026-04-21'
specificationVersion: '0.19'
tags:
  - Build Tools
  - CI/CD
  - Cloud Native
  - CNCF
  - Container Images
  - Containers
  - OCI
  - Open Source
apis:
  - aid: buildpacks:buildpack-api
    name: Buildpack API Specification
    description: >-
      The Buildpack API defines the contract between a buildpack and the
      lifecycle that executes it. It specifies detect, build, and export phases,
      layer contribution formats, environment variable handling, and SBOM
      generation interfaces.
    humanURL: https://buildpacks.io/docs/reference/spec/buildpack-api/
    tags:
      - API Specification
      - Buildpacks
      - Container Images
      - OCI
    properties:
      - type: Documentation
        url: https://buildpacks.io/docs/reference/spec/buildpack-api/
      - type: GitHubRepository
        url: https://github.com/buildpacks/spec
  - aid: buildpacks:platform-api
    name: Platform API Specification
    description: >-
      The Platform API defines the contract between a platform (such as pack or
      kpack) and the CNB lifecycle. It covers builder configuration, build
      inputs and outputs, stack definitions, and run image management.
    humanURL: https://buildpacks.io/docs/reference/spec/platform-api/
    tags:
      - API Specification
      - Container Images
      - Platforms
    properties:
      - type: Documentation
        url: https://buildpacks.io/docs/reference/spec/platform-api/
      - type: GitHubRepository
        url: https://github.com/buildpacks/spec
  - aid: buildpacks:distribution-api
    name: Distribution API Specification
    description: >-
      The Distribution API defines the OCI-based format for packaging and
      distributing buildpacks and builders via container registries, including
      the buildpackage format.
    humanURL: https://buildpacks.io/docs/reference/spec/distribution-api/
    tags:
      - API Specification
      - Distribution
      - OCI
      - Packaging
    properties:
      - type: Documentation
        url: https://buildpacks.io/docs/reference/spec/distribution-api/
      - type: GitHubRepository
        url: https://github.com/buildpacks/spec
